name: prism

### Common Settings ###
x-common: &common
  restart: unless-stopped
  networks:
    - prism

### Common Environmental Variables ###
x-env: &env
  PGID: ${PGID:-1000}
  PUID: ${PUID:-1000}
  TZ: ${TZ:-America/Los_Angeles}

### Common Healthcheck Settings ###
x-health: &health
  interval: 5s
  timeout: 10s
  retries: 3
  start_period: 60s
  start_interval: 30s

services:
  prism:
    image: ghcr.io/the-alphabet-cartel/prism:latest
    container_name: prism
    <<: *common
    environment:
      <<: *env
      TOKEN_FILE: /run/secrets/prism_token
    env_file: .env
    secrets:
      - prism_token
    volumes:
      - ./config:/app/src/config
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      <<: *health

secrets:
  prism_token:
    file: ./secrets/prism_fluxer_token

networks:
  prism:
    driver: bridge
